name: Déploiement automatique via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Déploiement FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.cluster021.hosting.ovh.net
          username: erpacfx
          password: ${{ secrets.FTP_PASSWORD }}
          # Transport FTP simple : cet endpoint OVH n'accepte pas le FTPS
          # (AUTH TLS → « 500 This security scheme is not implemented », port 990 fermé).
          # Le transfert chiffré passerait par SFTP (port 22, ouvert sur le host) —
          # évolution à prévoir (action SFTP dédiée + test avec les identifiants réels).
          local-dir: ./
          server-dir: /www/
          # Fichiers internes à ne jamais publier sur le serveur web.
          # Ceux déjà présents sur le serveur seront supprimés au prochain déploiement.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .claude/**
            docs/**
