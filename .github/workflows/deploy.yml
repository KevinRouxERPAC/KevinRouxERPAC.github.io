name: Déploiement automatique via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt
        uses: actions/checkout@v4

      - name: Déploiement FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.cluster021.hosting.ovh.net
          username: erpacfx
          password: ${{ secrets.FTP_PASSWORD }}
          # FTPS (FTP sur TLS) : les identifiants ne transitent plus en clair
          protocol: ftps
          local-dir: ./
          server-dir: /www/
          # Fichiers internes à ne jamais publier sur le serveur web.
          # Ceux déjà présents sur le serveur seront supprimés au prochain déploiement.
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .claude/**
            docs/**
